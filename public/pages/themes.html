<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Feedback Dashboard — Themes & Actions</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/themes.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 class="sidebar-title">Client Voice</h1>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
        <span class="material-icons-outlined" id="toggle-icon">chevron_left</span>
      </button>
    </div>
    <nav class="sidebar-nav">
      <a href="./overview.html" class="nav-item">
        <span class="material-icons-outlined">insights</span>
        <span class="nav-label">Overview</span>
      </a>
      <a href="./feedback.html" class="nav-item">
        <span class="material-icons-outlined">forum</span>
        <span class="nav-label">All Feedback</span>
      </a>
      <a href="./themes.html" class="nav-item active">
        <span class="material-icons-outlined">label_outline</span>
        <span class="nav-label">Themes</span>
      </a>
      <a href="./actions.html" class="nav-item">
        <span class="material-icons-outlined">bolt</span>
        <span class="nav-label">Actions</span>
      </a>
      <div class="nav-divider"></div>
      <a href="./data-import.html" class="nav-item">
        <span class="material-icons-outlined">file_download</span>
        <span class="nav-label">Data Import</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sync-status">
        <span class="material-icons-outlined">sync</span>
        Last sync: 2 min ago
      </div>
      <div class="total-count" id="total-count"></div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="page-header-text">
        <h2 class="page-title">Themes & Actions</h2>
        <p class="page-subtitle" id="theme-subtitle"></p>
      </div>
    </div>

    <div class="themes-toolbar">
      <div class="filter-pills" id="filter-pills"></div>
      <div class="sort-row">
        <span class="sort-label">Sort:</span>
        <select id="sort-select">
          <option value="newest">Newest First</option>
          <option value="mentions-desc">Most Mentions</option>
          <option value="importance">By Importance</option>
          <option value="name-asc">Name A-Z</option>
        </select>
      </div>
    </div>

    <div class="themes-columns-header">
      <div class="themes-col-label">Theme</div>
      <div class="suggestions-col-label">
        <span class="material-icons-outlined">auto_awesome</span>
        AI Action Suggestions
      </div>
    </div>

    <div class="theme-rows" id="theme-rows"></div>

    <div class="archive-section" id="archive-section" style="display:none;">
      <button class="archive-header" id="archive-toggle">
        <span class="material-icons-outlined">inventory_2</span>
        <span id="archive-label">Archived Themes</span>
        <span class="material-icons-outlined archive-chevron" id="archive-chevron">expand_more</span>
      </button>
      <div class="archive-rows" id="archive-rows" style="display:none;"></div>
    </div>
  </main>

  <div class="dialog-overlay" id="dialog-overlay">
    <div class="dialog dialog-lg" id="theme-dialog">
      <div class="dialog-header">
        <h3 id="dialog-title"></h3>
        <button class="dialog-close" id="dialog-close">
          <span class="material-icons-outlined">close</span>
        </button>
      </div>
      <div class="dialog-body" id="dialog-body"></div>
    </div>
  </div>

  <script src="../js/shared/sidebar.js"></script>
  <script src="../js/shared/mock-data.js"></script>
  <script src="../js/shared/api.js"></script>
  <script src="../js/shared/utils.js"></script>
  <script src="../js/pages/themes.js"></script>
</body>
</html>
